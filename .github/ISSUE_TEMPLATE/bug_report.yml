name: Bug report
description: Report incorrect tracing, diagnosis, CLI, MCP, or panel behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the smallest command or code sample that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Paste `tokensaver version --verbose` and relevant `tokensaver doctor` output. Remove sensitive data.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed prompts, customer data, credentials, and private tool output.
          required: true
