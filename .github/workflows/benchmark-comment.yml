name: Benchmark comment

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install .
      - name: Run deterministic regression benchmark
        env:
          TOKENSAVER_CHECK_UPDATE_ON_RUN: "0"
        run: |
          tokensaver benchmark \
            --before-file examples/case-studies/langgraph-repeated-tools/before.json \
            --after-file examples/case-studies/langgraph-repeated-tools/after.json \
            --output-dir /tmp/tokensaver-pr-benchmark \
            --title "TokenSaver PR regression benchmark"
      - name: Build PR comment
        run: |
          {
            echo '<!-- tokensaver-benchmark -->'
            echo '## TokenSaver benchmark'
            echo
            cat /tmp/tokensaver-pr-benchmark/benchmark.md
            echo
            echo '_Deterministic synthetic fixture. No prompts or private traces were uploaded._'
          } > /tmp/tokensaver-comment.md
      - name: Create or update benchmark comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- tokensaver-benchmark -->';
            const body = fs.readFileSync('/tmp/tokensaver-comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
