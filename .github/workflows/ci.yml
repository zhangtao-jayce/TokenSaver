name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install .
      - name: Compile
        run: python -m py_compile tokensaver/*.py
      - name: Test
        env:
          TOKENSAVER_CHECK_UPDATE_ON_RUN: "0"
        run: python -m unittest discover -s tests
      - name: Demo smoke test
        env:
          TOKENSAVER_CHECK_UPDATE_ON_RUN: "0"
        run: tokensaver demo --store-dir /tmp/tokensaver-demo
